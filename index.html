<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>QR Generator Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
</head>
<body class="dark">

<div class="container">
  <div class="top-bar">
    <h1>🔳 Generador de QR</h1>
    <button id="themeToggle">🌙</button>
  </div>

  <input type="text" id="urlInput" placeholder="Ingresá tu link..." />

  <div class="controls">
    <div class="control-group">
      <label>Color del QR</label>
      <input type="color" id="colorPicker" value="#000000">
    </div>

    <div class="control-group">
      <label>Logo</label>
      <button id="logoBtn">Seleccionar imagen</button>
      <input type="file" id="logoInput" accept="image/*" hidden>
      <span id="fileName">Ningún archivo seleccionado</span>
    </div>
  </div>

  <div id="qrContainer"></div>

  <div class="buttons">
    <button onclick="generateQR()">Generar</button>
    <button onclick="downloadQR()">Descargar</button>
    <button onclick="copyQR()">Copiar</button>
    <button onclick="resetAll()">Reset</button>
  </div>

  <p id="error"></p>
</div>

<footer>
  <p>© By Lalita635</p>
  <div class="links">
    <a href="https://github.com/" target="_blank">GitHub</a>
    <a href="#">Reportar Bug</a>
    <a href="#">Sugerir Mejora</a>
    <a href="#">Colaborar</a>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
